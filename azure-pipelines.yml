trigger:
- main

variables:
- group: DockerAppDeployment
- name: tag
  value: $(Build.BuildId)
- name: dockerfilePath
  value: '$(Build.SourcesDirectory)/database/Containerfile'

stages:
- stage: Build
  displayName: Build and Push to ACR
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    
    - task: AzureCLI@2
      displayName: Install Defender CLI
      inputs:
        azureSubscription: $(azureSubscriptionConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Downloading Defender CLI..."
          curl -fL https://aka.ms/defender-cli_linux-x64 -o defender
          chmod +x defender
          sudo mv defender /usr/local/bin/defender
          defender --version

    
    - task: Docker@2
      displayName: Build DB Image
      inputs:
        command: build
        repository: $(backendRepository)
        Dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          latest
          $(tag)

    - task: AzureCLI@2
      displayName: Scan DB Image
      inputs:
        azureSubscription: $(azureSubscriptionConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          for i in 1 2 3; do
            defender scan image $(containerRegistry)/$(backendRepository):$(tag) \
              --defender-output $(Build.ArtifactStagingDirectory)/$(backendRepository).sarif \
              --defender-break
            rc=$?
            if [ $rc -eq 0 ]; then
              break
            fi
            if [ $rc -ne 0 ] && [ $i -lt 3 ]; then
              echo "Scan failed with exit code $rc, retrying..."
              sleep 10
            else
              echo "Scan failed with exit code $rc"
              exit $rc
            fi
          done
      env:
        DEFENDER_TENANT_ID: $(DEFENDER_TENANT_ID)
        DEFENDER_CLIENT_ID: $(DEFENDER_CLIENT_ID)
        DEFENDER_CLIENT_SECRET: $(DEFENDER_CLIENT_SECRET)

    - task: Docker@2
      displayName: Push DB Image
      inputs:
        command: push
        repository: $(backendRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          latest
          $(tag)

    - task: AzureCLI@2
      displayName: Scan and Upload to ACR Exchange Image
      inputs:
        azureSubscription: $(azureSubscriptionConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(containerRegistry)
          docker pull ghcr.io/indicate-eu/benchmarking-data-exchange-server:latest
          docker tag ghcr.io/indicate-eu/benchmarking-data-exchange-server:latest $(containerRegistry)/$(frontendRepository):$(tag)
          docker tag ghcr.io/indicate-eu/benchmarking-data-exchange-server:latest $(containerRegistry)/$(frontendRepository):latest

          for i in 1 2 3; do
            defender scan image $(containerRegistry)/$(frontendRepository):$(tag) \
              --defender-output $(Build.ArtifactStagingDirectory)/$(frontendRepository).sarif \
              --defender-break
            rc=$?
            if [ $rc -eq 0 ]; then
              break
            fi
            if [ $rc -ne 0 ] && [ $i -lt 3 ]; then
              echo "Scan failed with exit code $rc, retrying..."
              sleep 10
            else
              echo "Scan failed with exit code $rc"
              exit $rc
            fi
          done

          docker push $(containerRegistry)/$(frontendRepository):$(tag)
          docker push $(containerRegistry)/$(frontendRepository):latest
      env:
        DEFENDER_TENANT_ID: $(DEFENDER_TENANT_ID)
        DEFENDER_CLIENT_ID: $(DEFENDER_CLIENT_ID)
        DEFENDER_CLIENT_SECRET: $(DEFENDER_CLIENT_SECRET)
    
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: $(Build.ArtifactStagingDirectory)
        ArtifactName: image-vulnerability-scans

    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        command: buildAndPush
        tags: latest,$(tag)
        repository: $(backendRepository)
        containerRegistry: $(dockerRegistryServiceConnectionProd)
        Dockerfile: $(dockerfilePath)


    - task: AzureCLI@2
      inputs:
        azureSubscription: $(azureSubscriptionConnectionProd)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(containerRegistryProd)
          docker pull ghcr.io/indicate-eu/benchmarking-data-exchange-server:latest
          docker tag ghcr.io/indicate-eu/benchmarking-data-exchange-server:latest $(containerRegistryProd)/$(frontendRepository):$(tag)
          docker tag ghcr.io/indicate-eu/benchmarking-data-exchange-server:latest $(containerRegistryProd)/$(frontendRepository):latest
          docker push $(containerRegistryProd)/$(frontendRepository):$(tag)
          docker push $(containerRegistryProd)/$(frontendRepository):latest


- stage: Deploy_nonprod
  displayName: Deploy to Azure Container Apps
  dependsOn: Build
  jobs:
  - deployment: Deploy_nonprod
    displayName: Deploy to Azure Container Apps Non Prod
    environment: benchmarking-nonprod
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureContainerApps@1
            displayName: Deploy to Azure Container App
            inputs:
              azureSubscription: $(azureSubscriptionConnection)
              imageToDeploy: $(containerRegistry)/$(frontendRepository):$(tag)
              containerAppName: $(frontendContainerAppName)
              resourceGroup: $(resourceGroup)
              environmentVariables: 'DATABASE_USER=$(POSTGRES_USER) DATABASE_PASSWORD=$(POSTGRES_PASSWORD) DATABASE_HOST=$(DATABASE_HOST) DATABASE_PORT=$(DATABASE_PORT) DATABASE_NAME=$(DATABASE_NAME) DATABASE_SCHEMA=$(DATABASE_SCHEMA)'

          - task: AzureContainerApps@1
            displayName: Deploy to Azure Container App
            inputs:
              azureSubscription: $(azureSubscriptionConnection)
              imageToDeploy: $(containerRegistry)/$(backendRepository):$(tag)
              containerAppName: $(backendContainerAppName)
              resourceGroup: $(resourceGroup)
              environmentVariables: 'POSTGRES_USER=$(POSTGRES_USER) POSTGRES_PASSWORD=$(POSTGRES_PASSWORD) POSTGRES_DB=$(POSTGRES_DB) PGDATA=$(PGDATA)'

- stage: Deploy_prod
  displayName: Deploy to Azure Container Apps
  dependsOn: Deploy_nonprod
  jobs:
  - deployment: Deploy_prod
    displayName: Deploy to Azure Container Apps Prod
    environment: benchmarking-prod
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureContainerApps@1
            displayName: Deploy to Azure Container App
            inputs:
              azureSubscription: $(azureSubscriptionConnectionProd)
              imageToDeploy: $(containerRegistryProd)/$(frontendRepository):$(tag)
              containerAppName: $(frontendContainerAppName)
              resourceGroup: $(resourceGroup)
              environmentVariables: 'DATABASE_USER=$(POSTGRES_USER) DATABASE_PASSWORD=$(POSTGRES_PASSWORD) DATABASE_HOST=$(DATABASE_HOST) DATABASE_PORT=$(DATABASE_PORT) DATABASE_NAME=$(DATABASE_NAME) DATABASE_SCHEMA=$(DATABASE_SCHEMA)'

          - task: AzureContainerApps@1
            displayName: Deploy to Azure Container App
            inputs:
              azureSubscription: $(azureSubscriptionConnectionProd)
              imageToDeploy: $(containerRegistryProd)/$(backendRepository):$(tag)
              containerAppName: $(backendContainerAppName)
              resourceGroup: $(resourceGroup)
              environmentVariables: 'POSTGRES_USER=$(POSTGRES_USER) POSTGRES_PASSWORD=$(POSTGRES_PASSWORD) POSTGRES_DB=$(POSTGRES_DB) PGDATA=$(PGDATA)'